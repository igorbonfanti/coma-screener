name: Update data

on:
  schedule:
    - cron: '30 5 * * 1'   # ogni lunedì 05:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rigenera dataset (SP500 + STOXX600)
        run: node scripts/fetch_data.js SP500 STOXX600
      - name: Commit dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nessun cambiamento nei dati."
          else
            git commit -m "chore: refresh settimanale dati"
            git push
          fi
